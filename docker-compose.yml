version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: wallpaper_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wallpaper
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # PHP-FPM 服务
  php:
    build: ./docker/php
    container_name: wallpaper_php
    restart: always
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - mysql

  # Nginx Web 服务器
  nginx:
    image: nginx:alpine
    container_name: wallpaper_nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

volumes:
  mysql_data:

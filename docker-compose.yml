version: '3.8'

services:
  # Caddy: 自动 HTTPS 网关 (Let's Encrypt 自动续签)
  caddy:
    image: caddy:2-alpine
    container_name: wallpaper_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      # 必须持久化 caddy_data 卷，否则重启容器会导致频繁重新申请证书被 Let's Encrypt 封禁
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: wallpaper_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wallpaper
    volumes:
      - mysql_data:/var/lib/mysql

  # PHP-FPM 服务
  php:
    build: ./docker/php
    container_name: wallpaper_php
    restart: always
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini
    depends_on:
      - mysql

  # Nginx Web 服务器 (内部网关)
  nginx:
    image: nginx:alpine
    container_name: wallpaper_nginx
    restart: always
    # 不再暴露宿主机的 8080，全部经由 Caddy 代理
    expose:
      - "80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

volumes:
  mysql_data:
  caddy_data:
  caddy_config:

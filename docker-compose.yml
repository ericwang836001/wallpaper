version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    container_name: wallpaper_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx

  mysql:
    image: mysql:8.0
    container_name: wallpaper_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wallpaper
    volumes:
      - mysql_data:/var/lib/mysql

  php:
    build: ./docker/php
    container_name: wallpaper_php
    restart: always
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini
    depends_on:
      - mysql

  # Laravel 异步任务队列监听进程
  queue:
    build: ./docker/php
    container_name: wallpaper_queue
    restart: always
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini
    depends_on:
      - mysql
    # 容器启动后，不运行 fpm，而是运行 Laravel 队列工作进程 (尝试3次失败后移入失败队列)
    command: php artisan queue:work --tries=3 --timeout=300

  nginx:
    image: nginx:alpine
    container_name: wallpaper_nginx
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

volumes:
  mysql_data:
  caddy_data:
  caddy_config:
